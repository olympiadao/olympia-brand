<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow" cx="20%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#162820"/>
      <stop offset="100%" stop-color="#0e1614"/>
    </radialGradient>
    <radialGradient id="bgGlow2" cx="85%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#122018" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0e1614" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ffae"/>
      <stop offset="100%" stop-color="#00cc8a"/>
    </linearGradient>
  </defs>

  <!-- Background layers -->
  <rect width="1200" height="630" fill="#0e1614"/>
  <rect width="1200" height="630" fill="url(#bgGlow)"/>
  <rect width="1200" height="630" fill="url(#bgGlow2)"/>

  <!-- Circuit-trace corner accents (primary) -->
  <path d="M0 100 L0 0 L100 0" fill="none" stroke="#00ffae" stroke-width="1.5" stroke-opacity="0.25"/>
  <path d="M0 100 Q0 50 50 50 L160 50" fill="none" stroke="#00ffae" stroke-width="1" stroke-opacity="0.15"/>
  <path d="M1100 0 L1200 0 L1200 100" fill="none" stroke="#00ffae" stroke-width="1.5" stroke-opacity="0.25"/>
  <path d="M1040 50 L1150 50 Q1200 50 1200 100" fill="none" stroke="#00ffae" stroke-width="1" stroke-opacity="0.15"/>
  <path d="M0 530 L0 630 L100 630" fill="none" stroke="#00ffae" stroke-width="1.5" stroke-opacity="0.18"/>
  <path d="M1100 630 L1200 630 L1200 530" fill="none" stroke="#00ffae" stroke-width="1.5" stroke-opacity="0.18"/>

  <!-- Additional circuit traces for depth (inspired by bg.png) -->
  <path d="M0 200 L0 160 L40 160" fill="none" stroke="#00ffae" stroke-width="1" stroke-opacity="0.1"/>
  <path d="M1200 200 L1200 160 L1160 160" fill="none" stroke="#00ffae" stroke-width="1" stroke-opacity="0.1"/>
  <path d="M60 0 L60 30 Q60 50 80 50" fill="none" stroke="#00ffae" stroke-width="0.75" stroke-opacity="0.09"/>
  <path d="M1140 0 L1140 30 Q1140 50 1120 50" fill="none" stroke="#00ffae" stroke-width="0.75" stroke-opacity="0.09"/>
  <path d="M0 400 L30 400 Q50 400 50 420 L50 460" fill="none" stroke="#00ffae" stroke-width="0.75" stroke-opacity="0.08"/>
  <path d="M1200 400 L1170 400 Q1150 400 1150 420 L1150 460" fill="none" stroke="#00ffae" stroke-width="0.75" stroke-opacity="0.08"/>
  <!-- Mid-level trace connectors -->
  <line x1="160" y1="50" x2="260" y2="50" stroke="#00ffae" stroke-width="0.5" stroke-opacity="0.07"/>
  <line x1="940" y1="50" x2="1040" y2="50" stroke="#00ffae" stroke-width="0.5" stroke-opacity="0.07"/>
  <!-- Right-side vertical trace -->
  <path d="M1100 530 L1100 580 Q1100 600 1080 600 L1020 600" fill="none" stroke="#00ffae" stroke-width="0.75" stroke-opacity="0.08"/>
  <!-- Left bottom extension -->
  <path d="M100 630 L100 600 Q100 580 120 580 L180 580" fill="none" stroke="#00ffae" stroke-width="0.75" stroke-opacity="0.08"/>

  <!-- Horizontal accent lines -->
  <line x1="100" y1="330" x2="500" y2="330" stroke="#00ffae" stroke-width="1" stroke-opacity="0.12"/>
  <line x1="700" y1="500" x2="1100" y2="500" stroke="#00ffae" stroke-width="0.5" stroke-opacity="0.07"/>

  <!-- Logo -->
  <image x="105" y="130" width="120" height="120" href="data:image/png;base64,"/>

  <!-- Title + Core DAO badge -->
  <text x="260" y="170" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" letter-spacing="-0.02em" fill="#ffffff">Olympia DAO</text>
  <rect x="620" y="143" width="108" height="32" rx="16" fill="none" stroke="#00ffae" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="674" y="165" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#00ffae" fill-opacity="0.8">Core DAO</text>

  <!-- Subtitle -->
  <text x="260" y="220" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#9ca3af">Sustainable Funding for Ethereum Classic</text>

  <!-- Funding categories -->
  <text x="260" y="270" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="18" font-weight="400" fill="#00ffae" fill-opacity="0.7">Core Software · Critical Infrastructure · Public Goods · Emergency Response</text>

  <!-- Footer: CTA left, URL right -->
  <g transform="translate(100, 350)">
    <rect x="0" y="0" width="220" height="52" rx="26" fill="url(#btnGrad)"/>
    <text x="110" y="35" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#0a0f10">Review Core Proposals</text>
  </g>
  <text x="100" y="450" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="18" font-weight="400" fill="#6b7280">Long-term stability for Ethereum Classic's core software and infrastructure</text>
  <text x="1075" y="575" text-anchor="end" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="18" font-weight="400" fill="#00ffae" fill-opacity="0.7">core.olympiadao.org</text>
  <rect x="0" y="625" width="1200" height="5" fill="#00ffae" opacity="0.6"/>
</svg>
