<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0f10"/>
  <!-- Subtle grid pattern -->
  <g stroke="#00ffae" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/><line x1="0" y1="600" x2="1200" y2="600"/>
  </g>
  <!-- Radial glow -->
  <radialGradient id="glow" cx="50%" cy="45%">
    <stop offset="0%" stop-color="#00ffae" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#00ffae" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Title -->
  <text x="600" y="250" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="700" letter-spacing="-0.02em" fill="#ffffff">Olympia Treasury</text>
  <!-- Subtitle -->
  <text x="600" y="310" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="400" fill="#9ca3af">On-Chain Protocol Funding for Ethereum Classic</text>
  <!-- Treasury address -->
  <rect x="310" y="350" width="580" height="48" rx="8" fill="rgba(0, 255, 174, 0.06)" stroke="#00ffae" stroke-opacity="0.2"/>
  <text x="600" y="381" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="16" font-weight="400" fill="#00ffae">0xCfE1e0ECbff745e6c800fF980178a8dDEf94bEe2</text>
  <!-- Descriptor -->
  <text x="600" y="445" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500" fill="#9ca3af">ECIP-1112 · Immutable Vault · OpenZeppelin v5.6</text>
  <!-- Bottom border accent -->
  <rect x="0" y="625" width="1200" height="5" fill="#F59E0B" opacity="0.6"/>
